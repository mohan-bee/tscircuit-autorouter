(255,0,0,0.5)" stroke-width="7.636363636363636" stroke-dasharray="0.2 0.2"/></g><g><polyline data-points="-4.361931139146396,-0.14006886085360395 -4.375,-0.127" data-type="line" data-label="" points="97.93805109800167,327.13077837072893 97.27272727272728,326.4654545454545" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="7.636363636363636" stroke-dasharray="0.2 0.2"/></g><g><polyline data-points="-4.375,-0.127 -5.373,-0.127" data-type="line" data-label="" points="97.27272727272728,326.4654545454545 46.46545454545452,326.4654545454545" fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="7.636363636363636"/></g><g><polyline data-points="-5.373,-0.127 -5.5,0" data-type="line" data-label="" points="46.46545454545452,326.4654545454545 40,320" fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="7.636363636363636"/></g><g><rect data-type="rect" data-label="top" data-x="0" data-y="0" x="154.54545454545456" y="228.36363636363637" width="330.9090909090909" height="183.27272727272725" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.019642857142857142"/></g><circle data-type="circle" data-label="" data-x="4.375" data-y="-0.127" cx="542.7272727272727" cy="326.4654545454545" r="38.18181818181818" fill="blue" stroke="none" stroke-width="0.019642857142857142"/><circle data-type="circle" data-label="" data-x="-4.375" data-y="-0.127" cx="97.27272727272728" cy="326.4654545454545" r="38.18181818181818" fill="blue" stroke="none" stroke-width="0.019642857142857142"/><g><circle data-type="point" data-label="net1
