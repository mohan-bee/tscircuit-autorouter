="free-11 polygon" data-points="5.000001,9.999998 4.000002,9.999999 3.000003,10 1.999997,10 0.999998,10 0,9.999998 0,8.999999 0.000001,8 0.000002,7.000001 0.000003,6.000002 3.8499980000000003,6.1500010000000005" points="320.00005600000003,40.00011200000006 264.000112,40.00005599999997 208.000168,40 151.999832,40 95.999888,40 40,40.00011200000006 40,96.00005599999997 40.000056,152 40.000112,207.99994399999997 40.000168,263.999888 255.59988800000002,255.599944" fill="rgba(40, 140, 220, 0.06)" stroke="rgba(20, 70, 160, 0.65)" stroke-width="0.017857142857142856"/></g><g><polygon data-type="polygon" data-label="free-11 projection target" data-points="3.8793156078930933,6.248150919987674 4.316429112204067,9.99999868357257 0.5392039069380421,9.99999907840997 0.0000028427347609216724,6.157267081411787" points="257.2416740420132,250.10354848069022 281.7200302834277,40.00007371993604 70.19541878853036,40.000051609041634 40.000159193146615,255.19304344093996" fill="rgba(255, 165, 0, 0.05)" stroke="rgba(255, 120, 0, 0.45)" stroke-width="0.017857142857142856"/></g><circle data-type="circle" data-label="" data-x="6.704851430887342" data-y="4.630011912803146" cx="415.47168012969115" cy="340.71933288302387" r="8.4" fill="hsl(0, 100%, 50%)" stroke="black" stroke-width="0.017857142857142856"/><circle data-type="circle" data-label="" data-x="8.363596214554224" data-y="4.6146940839949995" cx="508.3613880150366" cy="341.57713129628" r="8.4" fill="hsl(0, 100%, 50%)" stroke="black" stroke-width="0.017857142857142856"/><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":56,"c":0,"e":40,"b":0,"d":-56,"f":600};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>