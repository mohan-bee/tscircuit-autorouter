"net1" data-x="8.323234164757379" data-y="3.9346721694665243" cx="500.44561094912115" cy="379.3569212278287" r="3" fill="rgba(30, 30, 30, 0.85)"/></g><g><circle data-type="point" data-label="net1" data-x="9" data-y="9" cx="537.7841301537976" cy="99.89269500761367" r="3" fill="rgba(30, 30, 30, 0.85)"/></g><g><circle data-type="point" data-label="net2" data-x="3.9036618020035476" data-y="6.329657467611172" cx="256.6090001899778" cy="247.2208116713632" r="3" fill="rgba(30, 30, 30, 0.85)"/></g><g><circle data-type="point" data-label="net2" data-x="6.190419745652478" data-y="6.333090828918095" cx="382.77399101693334" cy="247.03138628902371" r="3" fill="rgba(30, 30, 30, 0.85)"/></g><g><circle data-type="point" data-label="net2" data-x="1" data-y="9" cx="96.40819466449348" cy="99.89269500761367" r="3" fill="rgba(30, 30, 30, 0.85)"/></g><g><circle data-type="point" data-label="net2" data-x="3.9036618020035476" data-y="6.329657467611172" cx="256.6090001899778" cy="247.2208116713632" r="3" fill="rgba(30, 30, 30, 0.85)"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":55.171991936163025,"c":0,"e":41.236202728330454,"b":0,"d":-55.171991936163025,"f":596.4406224330809};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>